<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />
    <title>Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #fce4ec, #f8bbd0, #f48fb1);
            padding: 1rem;
        }

        /* ── PLAYER CARD ── */
        .player-card {
            max-width: 420px;
            width: 100%;
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(20px);
            border-radius: 2.5rem;
            padding: 2rem 1.5rem 1.8rem;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.12);
            border: 1px solid rgba(255, 255, 255, 0.5);
            transition: transform 0.2s;
        }

        .player-card:hover {
            transform: translateY(-4px);
        }

        /* ── COVER ART ── */
        .cover-area {
            width: 100%;
            aspect-ratio: 1/1;
            background: linear-gradient(135deg, #ec407a, #ab47bc, #7b1fa2);
            border-radius: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1.5rem;
            box-shadow: 0 12px 30px rgba(233, 30, 99, 0.25);
            position: relative;
            overflow: hidden;
        }

        .cover-area i {
            font-size: 5rem;
            color: rgba(255, 255, 255, 0.3);
        }

        .cover-area .vinyl {
            position: absolute;
            width: 70%;
            height: 70%;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #222, #000);
            box-shadow: 0 0 0 8px rgba(255, 255, 255, 0.1), 0 0 0 16px rgba(0, 0, 0, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s;
        }

        .cover-area .vinyl i {
            font-size: 3.5rem;
            color: rgba(255, 255, 255, 0.15);
        }

        .cover-area .vinyl.spin {
            animation: spin 6s linear infinite;
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* ── SONG INFO ── */
        .song-info {
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .song-info .title {
            font-size: 1.3rem;
            font-weight: 700;
            color: #1a1a1a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-info .artist {
            font-size: 0.85rem;
            color: #6a4c5a;
            margin-top: 4px;
        }

        /* ── PROGRESS BAR ── */
        .progress-container {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 0.5rem 0 1rem;
        }

        .progress-container .time {
            font-size: 0.7rem;
            font-weight: 500;
            color: #6a4c5a;
            min-width: 36px;
        }

        #progress-bar {
            flex: 1;
            height: 4px;
            -webkit-appearance: none;
            appearance: none;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            outline: none;
            transition: height 0.2s;
        }

        #progress-bar::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ec407a;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(236, 64, 122, 0.4);
            transition: 0.1s;
        }

        #progress-bar::-webkit-slider-thumb:hover {
            transform: scale(1.15);
        }

        #progress-bar::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #ec407a;
            cursor: pointer;
            border: none;
        }

        /* ── CONTROLS ── */
        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin: 0.8rem 0 1.2rem;
        }

        .controls button {
            background: none;
            border: none;
            font-size: 1.2rem;
            color: #1a1a1a;
            cursor: pointer;
            transition: all 0.15s;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, 0.04);
        }

        .controls button:hover {
            background: rgba(236, 64, 122, 0.1);
            color: #ec407a;
            transform: scale(1.05);
        }

        .controls button:active {
            transform: scale(0.92);
        }

        .controls .play-btn {
            background: #ec407a;
            color: white;
            width: 56px;
            height: 56px;
            font-size: 1.6rem;
            box-shadow: 0 8px 24px rgba(236, 64, 122, 0.3);
        }

        .controls .play-btn:hover {
            background: #d81b60;
            transform: scale(1.04);
            color: white;
        }

        /* ── SEARCH & PLAYLIST ── */
        .playlist-section {
            margin-top: 1.2rem;
        }

        .search-container {
            position: relative;
            margin-bottom: 1rem;
        }

        .search-container i {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #b39eb0;
            font-size: 0.8rem;
        }

        #search-input {
            width: 100%;
            padding: 0.7rem 1rem 0.7rem 2.6rem;
            border-radius: 60px;
            border: 1px solid rgba(0, 0, 0, 0.06);
            background: rgba(255, 255, 255, 0.6);
            backdrop-filter: blur(4px);
            font-size: 0.8rem;
            color: #1a1a1a;
            outline: none;
            transition: border 0.2s;
            font-family: 'Inter', sans-serif;
        }

        #search-input:focus {
            border-color: #ec407a;
            box-shadow: 0 0 0 3px rgba(236, 64, 122, 0.08);
        }

        #search-input::placeholder {
            color: #b39eb0;
        }

        .playlist-list {
            max-height: 220px;
            overflow-y: auto;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: #ec407a transparent;
        }

        .playlist-list::-webkit-scrollbar {
            width: 4px;
        }

        .playlist-list::-webkit-scrollbar-thumb {
            background: #ec407a;
            border-radius: 10px;
        }

        .playlist-list::-webkit-scrollbar-track {
            background: transparent;
        }

        .song-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 0.6rem 1rem;
            border-radius: 60px;
            cursor: pointer;
            transition: all 0.15s;
            font-size: 0.8rem;
            color: #1a1a1a;
            margin-bottom: 4px;
            background: rgba(255, 255, 255, 0.3);
        }

        .song-item:hover {
            background: rgba(236, 64, 122, 0.06);
        }

        .song-item i {
            width: 20px;
            color: #b39eb0;
            font-size: 0.8rem;
        }

        .song-item .song-title {
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .song-item.playing {
            background: rgba(236, 64, 122, 0.08);
            font-weight: 600;
            color: #c2185b;
        }

        .song-item.playing i {
            color: #ec407a;
        }

        .song-item.hidden {
            display: none;
        }

        .no-results {
            text-align: center;
            padding: 1rem;
            color: #b39eb0;
            font-size: 0.8rem;
            display: none;
        }

        .no-results i {
            margin-right: 6px;
        }

        /* ── FOOTER ── */
        footer {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.6rem;
            color: #b39eb0;
            letter-spacing: 0.5px;
        }

        /* ── RESPONSIVE ── */
        @media (max-width: 420px) {
            .player-card {
                padding: 1.2rem 1rem;
            }
            .controls .play-btn {
                width: 48px;
                height: 48px;
                font-size: 1.3rem;
            }
            .controls button {
                width: 38px;
                height: 38px;
                font-size: 1rem;
            }
            .song-info .title {
                font-size: 1.1rem;
            }
        }
    </style>
</head>
<body>

    <div class="player-card">

        <!-- COVER ART -->
        <div class="cover-area">
            <div class="vinyl" id="vinylDisc">
                <i class="fas fa-record-vinyl"></i>
            </div>
        </div>

        <!-- SONG INFO -->
        <div class="song-info">
            <div class="title" id="current-title">✨ Pilih lagu</div>
            <div class="artist" id="current-artist">Artis</div>
        </div>

        <!-- PROGRESS BAR -->
        <div class="progress-container">
            <span class="time" id="current-time">0:00</span>
            <input type="range" id="progress-bar" value="0" min="0" max="100" step="0.1" />
            <span class="time" id="duration">0:00</span>
        </div>

        <!-- CONTROLS -->
        <div class="controls">
            <button id="prev-btn"><i class="fas fa-backward-step"></i></button>
            <button class="play-btn" id="play-btn"><i class="fas fa-play"></i></button>
            <button id="next-btn"><i class="fas fa-forward-step"></i></button>
        </div>

        <!-- PLAYLIST -->
        <div class="playlist-section">
            <div class="search-container">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="Cari lagu..." autocomplete="off" />
            </div>
            <div class="playlist-list" id="playlist-container">
                <!-- Items akan diisi oleh JS -->
            </div>
            <div id="no-results-msg" class="no-results"><i class="fas fa-binoculars"></i> Lagu tidak ditemukan</div>
        </div>

        <footer><i class="fas fa-headphones"></i> player · live search</footer>
    </div>

    <script>
        (function() {
            // ── DATA PLAYLIST ──
            const songs = [
                { title: "Position", artist: "Ariana Grande", src: "assets/ariana-grande-positions.mp3" },
                { title: "Firasat", artist: "Marcell", src: "assets/MARCELL-Firasat.mp3" },
                { title: "My Heart", artist: "ACHA & IRWANSYAH", src: "assets/ACHA SEPTRIASA - IRWANSYAH-My Heart.mp3" },
                { title: "Bersenja Gurau", artist: "Raim Laode", src: "assets/Bersenja Gurau - Raim Laode.mp3" },
                { title: "Puisi", artist: "Jikustik", src: "assets/Jikustik - Puisi.mp3" },
                { title: "Kita", artist: "Sheila On 7", src: "assets/Sheila On 7 - Kita.mp3" },
                { title: "Risk It All", artist: "Bruno Mars", src: "assets/Bruno Mars - Risk It All.mp3" },
                { title: "Masa Ini, Nanti, dan...", artist: "NUCA", src: "assets/NUCA - MASA INI, NANTI, DAN MASA INDAH LAINNYA.mp3" },
                { title: "Terpukau", artist: "Astrid", src: "assets/Astrid - Terpukau.mp3" },
                { title: "Mau Dibawa Kemana", artist: "Armada", src: "assets/mau-dibawa-kemana-armada.mp3" },
                { title: "Celengan Rindu", artist: "Fiersa Besari", src: "assets/Fiersa Besari - Celengan Rindu.mp3" },
                { title: "Anugerah Terindah", artist: "ANDMESH", src: "assets/ANDMESH - ANUGERAH TERINDAH.mp3" },
                { title: "Shape of My Heart", artist: "Backstreet Boys", src: "assets/Backstreet Boys - Shape of My Heart.mp3" },
                { title: "Aku Milikmu", artist: "Dewa 19", src: "assets/Dewa 19 -  Aku Milikmu.mp3" },
                { title: "Perfect", artist: "Ed Sheeran", src: "assets/Ed Sheeran - Perfect.mp3" },
                { title: "Bergema Sampai Selamanya", artist: "Nadhif Basalamah", src: "assets/Nadhif Basalamah - bergema sampai selamanya.mp3" },
                { title: "Kota Ini Tak Sama Tanpamu", artist: "Nadhif Basalamah", src: "assets/Nadhif Basalamah - kota ini tak sama tanpamu.mp3" },
                { title: "Orang Yang Sama", artist: "Virgoun", src: "assets/Virgoun - Orang Yang Sama.mp3.mp3" },
                { title: "Bila Kau Tak Disampingku", artist: "Sheila on 7", src: "assets/Sheila on 7 - Bila Kau Tak Disampingku.mp3" },
                { title: "Kita Usahakan Rumah Itu", artist: "Sal Priadi", src: "assets/Sal Priadi - Kita Usahakan Rumah Itu.mp3" },
                { title: "Kasih Putih", artist: "Glenn Fredly", src: "assets/Glenn Fredly - Kaish Putih.mp3" }
            ];

            // ── DOM REFS ──
            const audio = new Audio();
            const playBtn = document.getElementById('play-btn');
            const prevBtn = document.getElementById('prev-btn');
            const nextBtn = document.getElementById('next-btn');
            const progressBar = document.getElementById('progress-bar');
            const currentTimeEl = document.getElementById('current-time');
            const durationEl = document.getElementById('duration');
            const titleEl = document.getElementById('current-title');
            const artistEl = document.getElementById('current-artist');
            const playlistContainer = document.getElementById('playlist-container');
            const searchInput = document.getElementById('search-input');
            const noResults = document.getElementById('no-results-msg');
            const vinylDisc = document.getElementById('vinylDisc');

            let currentIndex = -1;
            let isPlaying = false;
            let activeItem = null;

            // ── RENDER PLAYLIST ──
            function renderPlaylist(filter = '') {
                playlistContainer.innerHTML = '';
                let visibleCount = 0;
                songs.forEach((song, idx) => {
                    const match = song.title.toLowerCase().includes(filter.toLowerCase()) ||
                                  song.artist.toLowerCase().includes(filter.toLowerCase());
                    if (filter && !match) return;
                    visibleCount++;

                    const div = document.createElement('div');
                    div.className = 'song-item';
                    if (idx === currentIndex) {
                        div.classList.add('playing');
                        activeItem = div;
                    }
                    div.innerHTML = `
                        <i class="fas fa-music"></i>
                        <span class="song-title">${song.title} — ${song.artist}</span>
                    `;
                    div.dataset.index = idx;
                    div.addEventListener('click', () => playSong(idx));
                    playlistContainer.appendChild(div);
                });
                noResults.style.display = (filter && visibleCount === 0) ? 'block' : 'none';
            }

            // ── PLAY SONG ──
            function playSong(index) {
                if (index < 0 || index >= songs.length) return;
                const song = songs[index];
                currentIndex = index;
                audio.src = song.src;
                audio.load();
                audio.play().catch(() => {});
                titleEl.textContent = song.title;
                artistEl.textContent = song.artist;

                // update playlist highlight
                document.querySelectorAll('.song-item').forEach((el, i) => {
                    el.classList.toggle('playing', i === index);
                });
                activeItem = document.querySelector('.song-item.playing');

                // vinyl spin
                vinylDisc.classList.add('spin');
                isPlaying = true;
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';

                // scroll to active
                if (activeItem) activeItem.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
            }

            // ── TOGGLE PLAY/PAUSE ──
            function togglePlay() {
                if (currentIndex === -1) {
                    // play first
                    playSong(0);
                    return;
                }
                if (isPlaying) {
                    audio.pause();
                    vinylDisc.classList.remove('spin');
                    playBtn.innerHTML = '<i class="fas fa-play"></i>';
                } else {
                    audio.play().catch(() => {});
                    vinylDisc.classList.add('spin');
                    playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                }
                isPlaying = !isPlaying;
            }

            // ── NEXT / PREV ──
            function nextSong() {
                if (currentIndex === -1) { playSong(0); return; }
                let next = (currentIndex + 1) % songs.length;
                playSong(next);
            }

            function prevSong() {
                if (currentIndex === -1) { playSong(songs.length - 1); return; }
                let prev = (currentIndex - 1 + songs.length) % songs.length;
                playSong(prev);
            }

            // ── AUDIO EVENTS ──
            audio.addEventListener('timeupdate', () => {
                if (audio.duration) {
                    const percent = (audio.currentTime / audio.duration) * 100;
                    progressBar.value = percent;
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                }
            });

            audio.addEventListener('loadedmetadata', () => {
                durationEl.textContent = formatTime(audio.duration);
                progressBar.max = 100;
            });

            audio.addEventListener('ended', () => {
                vinylDisc.classList.remove('spin');
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
                nextSong();
            });

            audio.addEventListener('play', () => {
                vinylDisc.classList.add('spin');
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            });

            audio.addEventListener('pause', () => {
                vinylDisc.classList.remove('spin');
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            });

            audio.addEventListener('error', (e) => {
                console.warn('Audio error, skipping to next');
                if (currentIndex !== -1) {
                    const next = (currentIndex + 1) % songs.length;
                    if (next !== currentIndex) playSong(next);
                }
            });

            // ── PROGRESS BAR SEEK ──
            progressBar.addEventListener('input', () => {
                if (audio.duration) {
                    const seekTime = (progressBar.value / 100) * audio.duration;
                    audio.currentTime = seekTime;
                    currentTimeEl.textContent = formatTime(seekTime);
                }
            });

            // ── HELPERS ──
            function formatTime(seconds) {
                if (!seconds || isNaN(seconds)) return '0:00';
                const m = Math.floor(seconds / 60);
                const s = Math.floor(seconds % 60);
                return `${m}:${s.toString().padStart(2, '0')}`;
            }

            // ── SEARCH ──
            searchInput.addEventListener('input', () => {
                renderPlaylist(searchInput.value.trim());
                // re-apply playing state
                if (currentIndex !== -1) {
                    const items = document.querySelectorAll('.song-item');
                    items.forEach((el, i) => {
                        if (parseInt(el.dataset.index) === currentIndex) {
                            el.classList.add('playing');
                            activeItem = el;
                        }
                    });
                }
            });

            // ── BUTTONS ──
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevSong);
            nextBtn.addEventListener('click', nextSong);

            // keyboard shortcut
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT') return;
                if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
            });

            // ── INIT ──
            renderPlaylist('');
            // set default info
            if (songs.length) {
                titleEl.textContent = '✨ Pilih lagu';
                artistEl.textContent = 'Artis';
            }
            durationEl.textContent = '0:00';
            currentTimeEl.textContent = '0:00';

            // auto-play first song on load (optional)
            // playSong(0);
        })();
    </script>

</body>
</html>
